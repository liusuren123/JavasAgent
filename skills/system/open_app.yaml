name: "打开应用程序"
description: "通过 Windows 搜索打开指定应用程序"
category: "system"
version: "1.0"
triggers:
  - "打开应用"
  - "运行程序"
  - "启动"

parameters:
  app_name:
    type: string
    description: "应用程序名称"
    required: true

steps:
  - action: key_combo
    keys: "win"
    comment: "打开开始菜单"

  - action: wait
    duration: 0.3

  - action: type_text
    text: "{{parameters.app_name}}"
    speed: "fast"
    comment: "输入应用名称"

  - action: wait
    duration: 0.5

  - action: key_combo
    keys: "enter"
    comment: "启动应用"
