# JavasAgent 默认配置

agent:
  name: "JavasAgent"
  version: "0.1.0"
  
  # 决策阈值：0-1，越高越倾向询问人类
  ask_human_threshold: 0.6
  
  # 单个任务最大执行时间（秒）
  max_task_duration: 3600
  
  # 步骤最大重试次数
  max_step_retries: 3

llm:
  # 默认使用的模型（本地优先，节省 API 费用）
  default_provider: "ollama"
  
  providers:
    # 本地 Ollama（推荐，多模态能力强）
    ollama:
      model: "qwen3.6"
      api_key_env: ""  # 本地无需 API Key
      base_url: "http://localhost:11434/v1"
    
    # Ollama 多模态（视觉感知专用）
    ollama-vision:
      model: "qwen3.6"
      api_key_env: ""
      base_url: "http://localhost:11434/v1"
    
    # 云端 API 备选
    zhipuai:
      model: "glm-4-plus"
      api_key_env: "ZHIPUAI_API_KEY"
      base_url: "https://open.bigmodel.cn/api/paas/v4"
    
    openai:
      model: "gpt-4o"
      api_key_env: "OPENAI_API_KEY"
      base_url: "https://api.openai.com/v1"
  
  # 生成参数
  temperature: 0.7
  max_tokens: 4096

memory:
  # 短期记忆容量
  short_term_max_messages: 50
  
  # 长期记忆存储路径
  long_term_db_path: "./data/memory/chroma"
  
  # 向量嵌入模型
  embedding_model: "text-embedding-3-small"

platform:
  # 屏幕操作延迟（秒），防止操作过快
  action_delay: 0.5
  
  # 截图保存路径
  screenshot_path: "./data/screenshots"
  
  # 日志级别
  log_level: "INFO"
  log_path: "./data/logs"

email:
  smtp_host: ""
  smtp_port: 587
  imap_host: ""
  imap_port: 993
  address: ""
  password: ""
  use_tls: true

tools:
  system_control:
    enabled: true

  process_manager:
    enabled: true

  code_dev:
    enabled: true
    workspace: "./workspace"
    test_command: "pytest"

  office_ops:
    enabled: true

  browser_control:
    enabled: true

  email_ops:
    enabled: true

  calendar_ops:
    enabled: true

  creative_tools:
    enabled: true

  image_ops:
    enabled: true

  voice_ops:
    enabled: true

  clipboard:
    enabled: true

  photoshop_control:
    enabled: true

  premiere_control:
    enabled: true

  aftereffects_control:
    enabled: true

  network_ops:
    enabled: true
    timeout: 30.0
    retries: 3
    retry_delay: 1.0
    download_workspace: "."
    # proxy: "http://proxy:8080"
